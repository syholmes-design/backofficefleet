<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Full cargo photo · Load 508 · BOF Demo</title>
  <style>
    body { margin: 0; padding: 16px; background: #27272a; font-family: system-ui, sans-serif; color: #fafafa; font-size: 12px; }

    .meta { padding: 10px 12px; background: #18181b; border-radius: 6px 6px 0 0; border: 1px solid #3f3f46; border-bottom: 0; }
    .shot { height: 320px; background: linear-gradient(180deg, #52525b 0%, #3f3f46 40%, #27272a 100%); border: 1px solid #3f3f46; border-radius: 0 0 8px 8px; position: relative; overflow: hidden; }
    .shot::before { content: ""; position: absolute; inset: 15%; border: 2px dashed rgba(250,250,250,.15); border-radius: 4px; }
    .shot::after { content: "SYNTHETIC CARGO LOAD — PALLETIZED DRY VAN"; position: absolute; bottom: 16px; left: 16px; right: 16px; text-align: center; font-size: 10px; letter-spacing: .15em; opacity: .5; }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="meta">
      <strong>Pre-trip / loaded trailer</strong> · Load L008 · T-110<br/>
      Captured 2026-03-02 08:15 EST · Youngstown, OH (demo GPS tag)
    </div>
    <div class="shot" role="img" aria-label="Synthetic full cargo photo placeholder"></div>

  </div>
