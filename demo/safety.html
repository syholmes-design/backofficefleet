<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety & Compliance | BackOfficeFleet</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/drivers.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* ── Layout ── */
        .safety-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 1024px) {
            .safety-layout { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .dashboard-view { padding: 50px 16px; }
        }

        /* ── Filter bar ── */
        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .filter-select {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-select i { font-size: 12px; color: var(--gray-400); }
        .btn-apply-filters {
            background: var(--brand-accent-700);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── Stats cards ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 768px) { .stats-row { grid-template-columns: 1fr; } }
        .stat-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 20px 24px;
        }
        .stat-card .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--gray-950);
            line-height: 1;
        }
        .stat-card .stat-number.teal { color: var(--brand-accent-700); }
        .stat-card .stat-number.red  { color: #C01048; }
        .stat-card .stat-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-800);
            margin-top: 4px;
        }
        .stat-card .stat-desc {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 6px;
        }

        /* ── Safety metrics table ── */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 12px;
        }
        .table-wrapper {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            overflow-x: auto;
        }
        .safety-table {
            width: 100%;
            min-width: 760px;
            border-collapse: collapse;
        }
        .safety-table thead th {
            background: var(--gray-50);
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
            white-space: nowrap;
        }
        .safety-table tbody td {
            padding: 12px 14px;
            font-size: 13px;
            color: var(--gray-700);
            border-bottom: 1px solid var(--gray-100);
        }
        .safety-table tbody tr:last-child td { border-bottom: none; }

        .pass-badge {
            display: inline-block;
            background: #ECFDF3;
            color: #027A48;
            border-radius: 99px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .fail-badge {
            display: inline-block;
            background: #FFF1F3;
            color: #C01048;
            border-radius: 99px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }
        .tier-elite    { background: #ECFDF3; color: #027A48; }
        .tier-standard { background: #FFFAEB; color: #B54708; }
        .tier-atrisk   { background: #FFF1F3; color: #C01048; }
        .tier-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
        }
        .dot-elite    { background: #12B76A; }
        .dot-standard { background: #F79009; }
        .dot-atrisk   { background: #F04438; }

        /* ── Right panel ── */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 20px;
        }
        .panel-card .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 16px;
        }
        .at-risk-driver + .at-risk-driver { margin-top: 14px; }
        .at-risk-driver .driver-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 4px;
        }
        .at-risk-driver .driver-reason {
            font-size: 12px;
            color: var(--gray-500);
            line-height: 1.4;
        }
        .violation-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 12px;
            color: var(--gray-600);
            line-height: 1.4;
        }
        .violation-item:last-child { border-bottom: none; }
        .violation-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gray-300);
            margin-top: 4px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="sidebar-container"></div>
        <main class="dashboard-outer">
            <div class="dashboard-view">

                <header class="content-header" style="margin-bottom: 20px;">
                    <div class="header-left" style="gap: 20px; align-items: center;">
                        <button id="sidebar-toggle" class="sidebar-toggle-btn custom-green-toggle">
                            <i class="bi bi-list"></i>
                        </button>
                        <div class="header-text">
                            <h1 class="heading-2">Safety &amp; Compliance</h1>
                        </div>
                    </div>
                    <div class="filter-bar" style="margin-bottom: 0;">
                        <div class="filter-select">Date Range Today <i class="bi bi-chevron-down"></i></div>
                        <div class="filter-select">Region <i class="bi bi-chevron-down"></i></div>
                        <div class="filter-select">Fleet <i class="bi bi-chevron-down"></i></div>
                        <button class="btn-apply-filters">Apply Filters</button>
                    </div>
                </header>

                <!-- Stats Row -->
                <div class="stats-row" id="stats-row">
                    <!-- Filled by JS -->
                </div>

                <div class="safety-layout">
                    <!-- Left: Metrics Table -->
                    <div>
                        <div class="section-title">Driver Safety Metrics</div>
                        <div class="table-wrapper">
                            <table class="safety-table">
                                <thead>
                                    <tr>
                                        <th>Driver</th>
                                        <th>OOS<br>Violations</th>
                                        <th>HOS Compliance</th>
                                        <th>Maintenance<br>Photos</th>
                                        <th>Tire Inspection</th>
                                        <th>Cargo<br>Damage</th>
                                        <th>Safety<br>Bonus</th>
                                        <th>Bonus</th>
                                    </tr>
                                </thead>
                                <tbody id="safety-tbody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right Panel -->
                    <div class="right-panel">
                        <!-- At-Risk Drivers -->
                        <div class="panel-card">
                            <div class="panel-title">At-Risk Drivers</div>
                            <div id="at-risk-list"></div>
                        </div>

                        <!-- Recent Violations -->
                        <div class="panel-card">
                            <div class="panel-title">Recent Violations &amp; Actions</div>
                            <div id="violations-list"></div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        fetch('sidebar.html').then(r => r.text()).then(html => {
            document.getElementById('sidebar-container').innerHTML = html;
            if (typeof setActiveSidebarLink === 'function') setActiveSidebarLink();
            if (typeof setupSidebarToggle === 'function') setupSidebarToggle();
        });

        const RECENT_VIOLATIONS = [
            'Emergency Management: CDL expiration flagged for immediate review.',
            'Management action on HOS compliance — 2 consecutive violations.',
            'HOS compliance monitoring action initiated.',
            'Rear light damage action logged.',
            'Vehicle failed tire/asset inspection event.',
            'Management actions reviewed for EMC compliance.'
        ];

        fetch('data/demo-data.json').then(r => r.json()).then(data => {
            const drivers = data.drivers;

            // Stats
            const totalDrivers = drivers.length;
            const eliteCount  = drivers.filter(d => d.safetyTier === 'Elite').length;
            const atRiskCount = drivers.filter(d => d.safetyTier === 'At Risk').length;
            const elitePct    = Math.round((eliteCount / totalDrivers) * 100);

            document.getElementById('stats-row').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalDrivers * 37}</div>
                    <div class="stat-label">Active Drivers</div>
                    <div class="stat-desc">Active drivers meeting performance standards.</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number teal">${elitePct}%</div>
                    <div class="stat-label">Elite Tier (%)</div>
                    <div class="stat-desc">The majority of KPI lies within Elite Tier (score ≥ 0.95).</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number red">${atRiskCount}</div>
                    <div class="stat-label">At Risk Drivers</div>
                    <div class="stat-desc">Drivers at or below the standard performance tier.</div>
                </div>`;

            // Safety table
            const tbody = document.getElementById('safety-tbody');
            drivers.forEach(driver => {
                const tier = driver.safetyTier || '—';
                const tierClass = tier === 'Elite' ? 'tier-elite' : tier === 'At Risk' ? 'tier-atrisk' : 'tier-standard';
                const dotClass  = tier === 'Elite' ? 'dot-elite'  : tier === 'At Risk' ? 'dot-atrisk'  : 'dot-standard';

                const tireHtml = driver.tireInspection === 'Fail'
                    ? `<span class="fail-badge">Fail</span>`
                    : `<span class="pass-badge">Pass</span>`;

                const lastName = driver.name.split(' ').slice(-1)[0];
                const firstName = driver.name.split(' ')[0][0] + '.';
                const shortName = `${firstName} ${lastName}`;

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:600; color:var(--gray-900);">${shortName}</td>
                        <td style="text-align:center;">${driver.oosViolations ?? 0}</td>
                        <td>${driver.hosCompliance ?? '—'}</td>
                        <td style="color:var(--gray-500); font-size:12px;">${driver.maintenancePhotos ?? '—'}</td>
                        <td>${tireHtml}</td>
                        <td>${driver.cargoDamage ?? '$0'}</td>
                        <td style="font-weight:600;">${driver.safetyBonus ?? '—'}</td>
                        <td>
                            <span class="tier-badge ${tierClass}">
                                <span class="tier-dot ${dotClass}"></span>
                                ${tier}
                            </span>
                        </td>
                    </tr>`;
            });

            // At-Risk Drivers panel
            const atRiskDrivers = drivers.filter(d => d.safetyTier === 'At Risk');
            const atRiskList = document.getElementById('at-risk-list');
            atRiskDrivers.forEach(d => {
                atRiskList.innerHTML += `
                    <div class="at-risk-driver">
                        <div class="driver-name">${d.name}</div>
                        <div class="driver-reason">${d.safetyViolation || 'Performance below standard threshold.'}</div>
                    </div>`;
            });

            // Recent Violations panel
            const violationsList = document.getElementById('violations-list');
            RECENT_VIOLATIONS.forEach(v => {
                violationsList.innerHTML += `
                    <div class="violation-item">
                        <span class="violation-dot"></span>
                        <span>${v}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
