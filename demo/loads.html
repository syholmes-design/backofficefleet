<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loads | BackOfficeFleet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/drivers.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* =============================================
           RESPONSIVE & ESTRUCTURA (Padding 50px)
           ============================================= */
        .dashboard-view {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        @media (max-width: 1024px) {
            .dashboard-outer { margin-left: 0; padding: 0; }
            .dashboard-view { padding: 50px 16px; } /* Tu padding de 50px */
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            overflow-x: auto;
            width: 100%;
            margin-top: 24px;
        }

        .drivers-table {
            min-width: 900px;
            width: 100%;
            border-collapse: collapse;
        }

        /* =============================================
           TU PAGINACIÓN ORIGINAL
           ============================================= */
        .table-pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: white;
            border-top: 1px solid var(--gray-200);
        }

        .pagination-numbers {
            display: flex;
            gap: 4px;
        }

        .page-num {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--gray-700);
        }

        .page-num.active {
            background: var(--brand-accent-700);
            color: white;
        }

        .pagination-arrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid var(--gray-300);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .pagination-arrow span { display: none; }
            .table-pagination { padding: 12px 8px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="sidebar-container"></div>
        <main class="dashboard-outer">
            <div class="dashboard-view">
                <header class="content-header">
                    <div class="header-left" style="gap: 20px; align-items: center;">
                        <button id="sidebar-toggle" class="sidebar-toggle-btn custom-green-toggle">
                            <i class="bi bi-list"></i>
                        </button>
                        <div class="header-text">
                            <h1 class="heading-2">Loads</h1>
                            <p class="body-m-medium">Manage your fleet loads</p>
                        </div>
                    </div>
                    <div class="header-actions">
                        <a href="add-loads.html" class="btn-primary">+ Add New Load</a>
                    </div>
                </header>

                <div class="table-wrapper">
                    <table class="drivers-table">
                        <thead>
                            <tr>
                                <th class="body-s-semibold">Load number</th>
                                <th class="body-s-semibold">Pickup</th>
                                <th class="body-s-semibold">Dropoff</th>
                                <th class="body-s-semibold">Rate</th>
                                <th class="body-s-semibold">Assigned driver</th>
                                <th class="body-s-semibold">Status</th>
                                <th class="body-s-semibold">Action</th>
                            </tr>
                        </thead>
                        <tbody id="loads-tbody"></tbody>
                    </table>
                    <div class="table-pagination" id="loads-pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
    fetch('sidebar.html').then(res => res.text()).then(html => {
        document.getElementById('sidebar-container').innerHTML = html;
        if (typeof setActiveSidebarLink === 'function') setActiveSidebarLink();
        if (typeof setupSidebarToggle === 'function') setupSidebarToggle();
    });

    let loadsData = [];
    const ROWS_PER_PAGE = 8;
    let currentPage = 1;

    function renderLoadsTable(page = 1) {
        const tbody = document.getElementById('loads-tbody');
        tbody.innerHTML = '';
        const start = (page - 1) * ROWS_PER_PAGE;
        const pageLoads = loadsData.slice(start, start + ROWS_PER_PAGE);

        pageLoads.forEach(load => {
            const rawStatus = load.driverName ? (load.status || 'Pending Assignment') : 'Pending Assignment';
            const statusText = rawStatus;

            let statusStyle = '';
            if (statusText === 'In Transit') statusStyle = 'background: var(--blue-50); color: var(--blue-700);';
            else if (statusText === 'Delivered') statusStyle = 'background: var(--success-50); color: var(--success-700);';
            else if (statusText === 'Pending Assignment') statusStyle = 'background: var(--warning-50); color: var(--warning-700);';

            let actionHtml = statusText === 'Pending Assignment'
                ? `<button class="btn-primary" onclick="window.location.href='add-loads.html'" style="padding: 6px 12px; font-size: 13px;">
                    <img src="assets/icons/icon (3).svg" style="width:14px; margin-right:4px; filter:brightness(0) invert(1);"> Assign
                   </button>`
                : `<a href="load-detail.html?id=${load.id}" class="body-m-semibold" style="text-decoration:none; color:var(--brand-accent-700); display:flex; align-items:center; gap:4px;">
                    <img src="assets/icons/icon (1).svg" style="width:16px;"> View
                   </a>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="body-m-semibold">${load.number || load.id}</span></td>
                <td class="body-m">${load.pickup || load.origin}</td>
                <td class="body-m">${load.dropoff || load.destination}</td>
                <td class="body-m">$${load.rate}</td>
                <td class="body-m">${load.driverName || load.assignedDriver || '-'}</td>
                <td><span class="status-badge" style="${statusStyle}">${statusText}</span></td>
                <td>${actionHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderPagination() {
        const totalPages = Math.ceil(loadsData.length / ROWS_PER_PAGE);
        const pagDiv = document.getElementById('loads-pagination');
        pagDiv.innerHTML = '';

        // Botón Previous
        const prev = document.createElement('button');
        prev.className = 'pagination-arrow body-m-semibold';
        prev.innerHTML = `<img src="assets/icons/Chevron Left.svg" style="width:14px;"> <span>Previous</span>`;
        prev.disabled = currentPage === 1;
        prev.onclick = () => { currentPage--; updateUI(); };

        // Números (Tus cuadraditos originales)
        const nums = document.createElement('div');
        nums.className = 'pagination-numbers';
        for (let i = 1; i <= totalPages; i++) {
            const n = document.createElement('div');
            n.className = `page-num ${i === currentPage ? 'active' : ''}`;
            n.textContent = i;
            n.onclick = () => { currentPage = i; updateUI(); };
            nums.appendChild(n);
        }

        // Botón Next
        const next = document.createElement('button');
        next.className = 'pagination-arrow body-m-semibold';
        next.innerHTML = `<span>Next</span> <img src="assets/icons/Chevron Right.svg" style="width:14px;">`;
        next.disabled = currentPage === totalPages;
        next.onclick = () => { currentPage++; updateUI(); };

        pagDiv.appendChild(prev);
        pagDiv.appendChild(nums);
        pagDiv.appendChild(next);
    }

    function updateUI() {
        renderLoadsTable(currentPage);
        renderPagination();
    }

    fetch('data/demo-data.json').then(res => res.json()).then(data => {
        loadsData = data.loads;
        updateUI();
    });
    </script>
</body>
</html>
