<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Founding Fleet Application | BackOfficeFleet</title><link rel="stylesheet" href="site.css"></head><body>
<header class="site-header"><div class="container nav"><a class="logo" href="index.html">BackOfficeFleet</a></div></header>
<main class="page"><div class="container">
  <div class="section-head center"><span class="eyebrow">Founding Fleet</span><h1 class="page-title">Apply to Become a Founding Fleet Member</h1><p>Limited to 10 fleets. Includes early access, direct product input, priority onboarding, and lifetime preferred pricing.</p></div>
  <div class="form-shell">
    <label>Company name</label><input type="text" placeholder="Company">
    <label>Contact name</label><input type="text" placeholder="Full name">
    <label>Email</label><input type="email" placeholder="you@company.com">
    <label>Fleet type</label><select><option>External / for-hire fleet</option><option>Internal / private fleet</option><option>Field service / telecom</option><option>Warranty / service operations</option></select>
    <label>Fleet size</label><select><option>15–20</option><option>21–50</option><option>50+</option></select>
    <label>Why do you want to join as a founding fleet?</label><textarea placeholder="Tell us what you want to shape in the product and what problems you need solved."></textarea>
    <div style="margin-top:18px"><a class="btn btn-primary" href="index.html">Submit Application</a></div>
    <p class="small" style="margin-top:12px">Static handoff page. Sofia can wire this to email capture or CRM next.</p>
  </div>
</div></main></body></html>
